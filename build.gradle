// Merge these blocks into the app/build.gradle generated by `flutter create`.
// Do NOT replace the whole file — Flutter's default template already wires up
// the Flutter/Kotlin Gradle plugins; only the pieces below are project-specific.

plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"   // <-- ADD: required for Firebase
}

android {
    namespace "com.aiforexsignals.app"
    compileSdk 34

    defaultConfig {
        applicationId "com.aiforexsignals.app"
        minSdk 23          // Firebase Messaging requires API 23+
        targetSdk 34
        versionCode 1
        versionName "1.0.0"

        // Injected at build time: flutter build apk --dart-define=API_BASE_URL=https://api.yourdomain.com
        // (read in Dart via String.fromEnvironment in app_constants.dart)
    }

    buildTypes {
        release {
            // Configure your own signing config for the Play Store; debug signing
            // is used here only so `flutter build apk` works out of the box.
            signingConfig signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:33.1.0')
}
